<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKET HUB</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c14;--panel:#0d1320;--border:#1a2540;--accent:#00d4ff;--accent2:#ff6b35;--green:#00ff88;--red:#ff3366;--gold:#ffd700;--text:#c8d8f0;--muted:#4a6080;--alert:#ff6b35;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,212,255,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(255,107,53,.04) 0%,transparent 50%);pointer-events:none;z-index:0;}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(13,19,32,.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.4);}
.logo span{color:var(--accent2);}
.header-right{display:flex;align-items:center;gap:14px;}
.clock{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent);text-align:right;}
.clock .date{font-size:10px;color:var(--muted);}
.alert-badge{background:var(--alert);color:#fff;border-radius:50%;width:20px;height:20px;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700;animation:pulse-alert 2s infinite;}
@keyframes pulse-alert{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4);}50%{box-shadow:0 0 0 8px rgba(255,107,53,0);}}
.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 11px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
.refresh-btn.spinning span{animation:spin 1s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

.status-bar{display:flex;gap:14px;padding:7px 20px;background:rgba(13,19,32,.7);border-bottom:1px solid var(--border);font-family:'Share Tech Mono',monospace;font-size:10px;overflow-x:auto;white-space:nowrap;align-items:center;}
.status-item{display:flex;align-items:center;gap:5px;color:var(--muted);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.dot.open{background:var(--green);animation:blink 2s infinite;}
.dot.closed{background:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

.tabs{display:flex;gap:3px;padding:14px 20px 0;overflow-x:auto;}
.tab{padding:7px 16px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'Share Tech Mono',monospace;white-space:nowrap;}
.tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);box-shadow:0 0 15px rgba(0,212,255,.3);}
.tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}

.main{padding:18px 20px;position:relative;z-index:1;}
.section-panels{display:none;}
.section-panels.active{display:block;}
.section-label{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* PORTFOLIO */
.pf-banner{background:linear-gradient(135deg,rgba(0,212,255,.06) 0%,rgba(255,107,53,.04) 100%);border:1px solid var(--border);border-left:3px solid var(--gold);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
.pf-title{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;}
.pf-totals{display:flex;gap:20px;flex-wrap:wrap;}
.pf-total-item{text-align:center;}
.pf-total-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:2px;}
.pf-total-value{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:1px;text-shadow:0 0 12px rgba(255,215,0,.3);}
.pf-toggle-btn{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:6px 13px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:1px;transition:all .2s;white-space:nowrap;}
.pf-toggle-btn:hover{background:var(--gold);color:var(--bg);}

/* CARDS */
.ticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:11px;margin-bottom:22px;}
.ticker-card{background:var(--panel);border:1px solid var(--border);padding:14px;position:relative;overflow:hidden;transition:border-color .2s,transform .1s;}
.ticker-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);}
.ticker-card.negative::before{background:var(--red);}
.ticker-card.positive::before{background:var(--green);}
.ticker-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.ticker-card.has-alert{border-color:var(--alert);}
.ticker-card.has-alert::after{content:'🔔';position:absolute;top:8px;right:8px;font-size:11px;}
.ticker-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.ticker-name{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px;}
.ticker-category{font-size:9px;color:var(--muted);background:rgba(255,255,255,.05);padding:2px 5px;letter-spacing:1px;text-transform:uppercase;}
.ticker-price{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;margin-bottom:3px;color:#fff;}
.ticker-price-jpy{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(255,255,255,.55);letter-spacing:1px;margin-bottom:5px;}
.ticker-meta{display:flex;align-items:center;gap:10px;}
.ticker-change{font-family:'Share Tech Mono',monospace;font-size:12px;font-weight:700;padding:2px 7px;}
.ticker-change.up{color:var(--green);background:rgba(0,255,136,.1);}
.ticker-change.down{color:var(--red);background:rgba(255,51,102,.1);}
.ticker-label{font-size:10px;color:var(--muted);}
.conv-row{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);}
.conv-val{color:var(--accent);font-size:13px;font-weight:700;}

/* CHART */
.chart-wrap{margin-top:9px;position:relative;}
.mini-chart{width:100%;height:70px;display:block;}
.tf-bar{display:flex;gap:3px;margin-top:5px;}
.tf-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:2px 7px;font-family:'Share Tech Mono',monospace;font-size:9px;cursor:pointer;transition:all .15s;letter-spacing:1px;}
.tf-btn:hover{border-color:var(--accent);color:var(--accent);}
.tf-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.chart-wm{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);text-align:right;margin-top:2px;opacity:.5;}

/* HOLDINGS */
.holding-row{display:flex;align-items:center;gap:6px;margin-top:8px;border-top:1px solid rgba(255,255,255,.05);padding-top:8px;}
.holding-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
.holding-input{flex:1;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);color:var(--gold);padding:4px 7px;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;min-width:0;transition:border-color .2s;}
.holding-input:focus{border-color:var(--gold);}
.holding-input::placeholder{color:rgba(255,215,0,.2);}
.holding-value{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold);text-align:right;white-space:nowrap;min-width:55px;}

/* BUTTONS */
.btn{padding:7px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;border:none;transition:all .2s;text-transform:uppercase;}
.btn-accent{background:var(--accent);color:var(--bg);font-weight:700;}
.btn-accent:hover{box-shadow:0 0 15px rgba(0,212,255,.4);}
.btn-sm{padding:4px 10px;font-size:10px;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);padding:4px 9px;font-size:10px;font-family:'Share Tech Mono',monospace;cursor:pointer;transition:all .2s;}
.btn-danger:hover{background:var(--red);color:#fff;}

/* PANELS */
.panel{background:var(--panel);border:1px solid var(--border);padding:18px;margin-bottom:20px;}
.panel-title{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:var(--accent2);margin-bottom:14px;}
.alert-form{display:grid;grid-template-columns:1fr 1fr 1fr auto auto;gap:7px;align-items:center;margin-bottom:14px;}
select,input[type=number],input[type=text]{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:7px 10px;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;transition:border-color .2s;}
select:focus,input:focus{border-color:var(--accent);}
select option{background:var(--panel);}
.alert-list{display:flex;flex-direction:column;gap:5px;}
.alert-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid var(--border);padding:7px 11px;font-family:'Share Tech Mono',monospace;font-size:11px;}
.alert-item.triggered{border-color:var(--alert);background:rgba(255,107,53,.08);animation:blink-al 1s infinite;}
@keyframes blink-al{0%,100%{border-color:var(--alert);}50%{border-color:transparent;}}
.al-sym{color:var(--accent);margin-right:6px;}
.al-cond{color:var(--muted);margin:0 6px;}
.al-price{color:#fff;font-weight:700;}
.badge{font-size:10px;padding:2px 6px;margin-left:6px;}
.b-active{color:var(--green);background:rgba(0,255,136,.1);}
.b-hit{color:var(--alert);background:rgba(255,107,53,.15);}

/* SYMBOL MANAGER */
.sym-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:640px){.sym-grid{grid-template-columns:1fr;}}
.sym-col-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sym-add-row{display:flex;gap:6px;margin-bottom:10px;}
.sym-add-row input{flex:1;}
.sym-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;min-height:30px;}
.chip{display:inline-flex;align-items:center;gap:4px;background:rgba(0,212,255,.08);border:1px solid var(--accent);color:var(--accent);padding:3px 8px;font-family:'Share Tech Mono',monospace;font-size:11px;}
.chip .x{color:var(--red);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;}
.chip .x:hover{color:#fff;}
.preset-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase;}
.presets{display:flex;flex-wrap:wrap;gap:4px;}
.pchip{background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 8px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;}
.pchip:hover:not(.added){border-color:var(--green);color:var(--green);}
.pchip.added{opacity:.35;cursor:default;}
.sym-note{font-size:10px;color:var(--muted);margin-top:8px;line-height:1.6;}

/* TOAST */
.toast-container{position:fixed;top:75px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--panel);border:1px solid var(--alert);padding:11px 14px;min-width:250px;animation:slide-in .3s ease;box-shadow:0 0 20px rgba(255,107,53,.3);}
@keyframes slide-in{from{transform:translateX(110%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.toast-title{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--alert);letter-spacing:2px;margin-bottom:3px;}
.toast-body{font-size:12px;color:#fff;}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:8px;color:var(--accent);text-shadow:0 0 30px rgba(0,212,255,.5);margin-bottom:14px;}
.loading-bar{width:180px;height:2px;background:var(--border);overflow:hidden;}
.loading-prog{height:100%;background:var(--accent);animation:lprog 1.5s ease forwards;}
@keyframes lprog{0%{width:0;}100%{width:100%;}}
.last-update{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted);}
.empty-msg{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);padding:8px 0;}

@media(max-width:600px){
  header{padding:11px 14px;}.logo{font-size:20px;}.main{padding:13px 14px;}
  .ticker-grid{grid-template-columns:1fr 1fr;gap:8px;}.ticker-price{font-size:21px;}
  .alert-form{grid-template-columns:1fr 1fr;}.pf-totals{gap:14px;}
}
</style>
</head>
<body>

<div class="loading-overlay" id="lo">
  <div class="loading-logo">MARKET HUB</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:18px;letter-spacing:2px;">データ読み込み中...</div>
  <div class="loading-bar"><div class="loading-prog"></div></div>
</div>

<div class="toast-container" id="toasts"></div>

<header>
  <div class="logo">MARKET <span>HUB</span></div>
  <div class="header-right">
    <div id="alertBadge" class="alert-badge">0</div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()"><span id="ri">↻</span> 更新</button>
    <div class="clock"><div id="ct">--:--:--</div><div class="date" id="cd">--</div></div>
  </div>
</header>

<div class="status-bar">
  <div class="status-item"><div class="dot open"></div>仮想通貨</div>
  <div class="status-item"><div class="dot" id="dFx"></div>為替</div>
  <div class="status-item"><div class="dot" id="dTh"></div>タイ株</div>
  <div class="status-item" style="margin-left:auto;"><span class="last-update">更新: <span id="lu">--</span></span></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('all')">全て</button>
  <button class="tab" onclick="switchTab('crypto')">仮想通貨</button>
  <button class="tab" onclick="switchTab('forex')">為替</button>
  <button class="tab" onclick="switchTab('thai')">タイ株</button>
  <button class="tab" onclick="switchTab('alerts')">🔔 アラーム</button>
  <button class="tab" onclick="switchTab('manage')">⚙ 銘柄管理</button>
</div>

<div class="main">
  <div class="pf-banner">
    <div>
      <div class="pf-title">💰 ポートフォリオ合計</div>
      <div class="pf-totals">
        <div class="pf-total-item"><div class="pf-total-label">USD $</div><div class="pf-total-value" id="pfU">--</div></div>
        <div class="pf-total-item"><div class="pf-total-label">JPY ¥</div><div class="pf-total-value" id="pfJ">--</div></div>
        <div class="pf-total-item"><div class="pf-total-label">THB ฿</div><div class="pf-total-value" id="pfT">--</div></div>
      </div>
    </div>
    <button class="pf-toggle-btn" id="pfBtn" onclick="toggleHoldings()">保有量を入力</button>
  </div>

  <div id="section-all" class="section-panels active">
    <div class="section-label">🪙 仮想通貨</div><div class="ticker-grid" id="cgAll"></div>
    <div class="section-label">💱 為替</div><div class="ticker-grid" id="fgAll"></div>
    <div class="section-label">📈 タイ株 <span style="font-size:9px;color:var(--red);margin-left:6px;">※デモデータ</span></div><div class="ticker-grid" id="tgAll"></div>
  </div>
  <div id="section-crypto" class="section-panels">
    <div class="section-label">🪙 仮想通貨</div><div class="ticker-grid" id="cgTab"></div>
  </div>
  <div id="section-forex" class="section-panels">
    <div class="section-label">💱 為替</div><div class="ticker-grid" id="fgTab"></div>
  </div>
  <div id="section-thai" class="section-panels">
    <div class="section-label">📈 タイ株 <span style="font-size:9px;color:var(--red);margin-left:6px;">※デモデータ</span></div><div class="ticker-grid" id="tgTab"></div>
  </div>
  <div id="section-alerts" class="section-panels">
    <div class="panel">
      <div class="panel-title">🔔 価格アラーム設定</div>
      <div class="alert-form">
        <select id="asSym"></select>
        <select id="asCond"><option value="above">以上 ↑</option><option value="below">以下 ↓</option></select>
        <input type="number" id="asPrice" placeholder="目標価格" step="0.01">
        <select id="asCur"><option value="USD">USD</option><option value="JPY">JPY</option><option value="THB">THB</option></select>
        <button class="btn btn-accent" onclick="addAlert()">追加</button>
      </div>
      <div class="alert-list" id="alertList"></div>
    </div>
  </div>
  <div id="section-manage" class="section-panels">
    <div class="panel">
      <div class="panel-title">⚙ 銘柄管理</div>
      <div class="sym-grid">
        <div>
          <div class="sym-col-title">🪙 仮想通貨</div>
          <div class="sym-add-row">
            <input type="text" id="ciInput" placeholder="例: DOGE, ADA, AVAX" oninput="this.value=this.value.toUpperCase()">
            <button class="btn btn-accent btn-sm" onclick="addCrypto()">追加</button>
          </div>
          <div class="sym-chips" id="cChips"></div>
          <div class="preset-label">プリセットから追加</div>
          <div class="presets" id="cPresets"></div>
          <div class="sym-note">※ CoinGecko対応銘柄<br>PSOL, JUPSOL, JUP なども追加可能</div>
        </div>
        <div>
          <div class="sym-col-title">📈 タイ株 (SET)</div>
          <div class="sym-add-row">
            <input type="text" id="tiInput" placeholder="例: TRUE, MINT, IVL" oninput="this.value=this.value.toUpperCase()">
            <button class="btn btn-accent btn-sm" onclick="addThai()">追加</button>
          </div>
          <div class="sym-chips" id="tChips"></div>
          <div class="preset-label">プリセットから追加</div>
          <div class="presets" id="tPresets"></div>
          <div class="sym-note">※ タイ株は現在デモデータで表示<br>実際のSET価格はAPI契約が必要</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let MD = {};
let alerts  = JSON.parse(localStorage.getItem('mhAlerts')   || '[]');
let holdings= JSON.parse(localStorage.getItem('mhHoldings') || '{}');
let showH   = false;
let triggered = new Set();

const DC = ['BTC','ETH','SOL','BNB','XRP'];
const DT = ['AOT','PTT','SCB','KBANK','ADVANC','GULF'];
let AC = JSON.parse(localStorage.getItem('mhCrypto') || JSON.stringify(DC));
let AT = JSON.parse(localStorage.getItem('mhThai')   || JSON.stringify(DT));

const CP = ['BTC','ETH','SOL','BNB','XRP','ADA','DOGE','AVAX','DOT','LINK','MATIC','UNI','ATOM','LTC','TRX','TON','SHIB','APT','OP','ARB','PSOL','JUPSOL','JUP'];
const TP = ['AOT','PTT','SCB','KBANK','ADVANC','GULF','TRUE','MINT','IVL','PTTGC','CPALL','BDMS','SCC','DELTA','HMPRO','BJC','BH','CENTEL','CPN'];

const GID = {BTC:'bitcoin',ETH:'ethereum',SOL:'solana',BNB:'binancecoin',XRP:'ripple',ADA:'cardano',DOGE:'dogecoin',AVAX:'avalanche-2',DOT:'polkadot',LINK:'chainlink',MATIC:'matic-network',UNI:'uniswap',ATOM:'cosmos',LTC:'litecoin',TRX:'tron',TON:'the-open-network',SHIB:'shiba-inu',APT:'aptos',OP:'optimism',ARB:'arbitrum',PSOL:'marinade-staked-sol',JUPSOL:'jupiter-staked-sol',JUP:'jupiter-exchange-solana'};
const geckoId = s => GID[s] || s.toLowerCase();

const TB = {
  AOT:{n:'空港タイ',p:68.25,c:0.73},PTT:{n:'PTT石油',p:29.50,c:-0.34},SCB:{n:'サイアム商銀',p:95.75,c:1.29},
  KBANK:{n:'カシコン銀',p:138.00,c:-0.72},ADVANC:{n:'AIS通信',p:211.00,c:0.48},GULF:{n:'ガルフE',p:42.50,c:-1.16},
  TRUE:{n:'TrueMove',p:11.20,c:0.27},MINT:{n:'マイナー食品',p:34.50,c:-0.58},IVL:{n:'インドラマ',p:29.00,c:0.69},

const TFS = ['4H','1D','1W','1M','6M','1Y'];
const TF_DAYS = {'4H':1,'1D':1,'1W':7,'1M':30,'6M':180,'1Y':365};
let chartTF    = {};   // sym → tf string
let chartCache = {};   // "sym_tf" → pts array

// Binance klines intervals
const BN_INTERVAL = {'4H':'15m','1D':'1h','1W':'4h','1M':'1d','6M':'3d','1Y':'1w'};
const BN_LIMIT    = {'4H':16,   '1D':24, '1W':42,  '1M':30, '6M':60, '1Y':52};

async function fetchCryptoChart(sym, tf) {
  const key = sym + '_' + tf;
  if (chartCache[key]) return chartCache[key];
  const bsym     = BINANCE_SYM[sym] || (sym + 'USDT');
  const interval = BN_INTERVAL[tf] || '1h';
  const limit    = BN_LIMIT[tf]    || 24;
  try {
    const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${bsym}&interval=${interval}&limit=${limit}`);
    if (!r.ok) return null;
    const d = await r.json();
    if (!d || !d.length) return null;
    const pts = d.map(k => ({ t: k[0], v: parseFloat(k[4]) })); // close price
    chartCache[key] = pts;
    setTimeout(() => { delete chartCache[key]; }, 300000);
    return pts;
  } catch(e) { return null; }
}

// Deterministic synthetic pts for forex/thai (no Math.random → stable across renders)
function syntheticPts(sym, tf, baseVal) {
  const n = {'4H':48,'1D':48,'1W':56,'1M':60,'6M':72,'1Y':90}[tf] || 48;
  const seed = sym.split('').reduce((a,c) => a * 31 + c.charCodeAt(0), 1);
  let v = baseVal || 100, pts = [];
  for (let i = 0; i < n; i++) {
    const x = Math.sin(seed + i * 2.399) * 0.008;  // deterministic wave
    v = v * (1 + x);
    pts.push({ t: Date.now() - (n - i) * 3600000, v });
  }
  return pts;
}

async function setTF(sym, tf, event) {
  event.stopPropagation();
  chartTF[sym] = tf;
  // Update ALL tf-btn states for this symbol across grids
  document.querySelectorAll('.ticker-card[data-sym="' + sym + '"]').forEach(card => {
    card.querySelectorAll('.tf-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tf === tf);
    });
    const wm = card.querySelector('.chart-wm');
    if (wm) wm.textContent = '読み込み中...';
  });
  await loadAndDraw(sym);
}

async function loadAndDraw(sym) {
  const tf = chartTF[sym] || '1D';
  const d  = MD[sym];
  if (!d) return;

  let pts = null;
  if (d.cat === 'CRYPTO') {
    pts = await fetchCryptoChart(sym, tf);
  }
  if (!pts) {
    const base = d.cat === 'SET株' ? d.price : (d.cat === 'FOREX' ? d.jpy : d.usd);
    pts = syntheticPts(sym, tf, base || 100);
  }

  const isUp = pts.length >= 2 ? pts[pts.length-1].v >= pts[0].v : true;
  const label = d.cat === 'SET株' ? `SET株 / ${tf} ※デモ` : `${d.cat} / ${tf}`;

  document.querySelectorAll('.ticker-card[data-sym="' + sym + '"]').forEach(card => {
    const canvas = card.querySelector('canvas.mini-chart');
    if (canvas) drawPts(canvas, pts, isUp);
    const wm = card.querySelector('.chart-wm');
    if (wm) wm.textContent = label;
  });
}

function drawPts(canvas, pts, isUp) {
  if (!canvas || !pts || pts.length < 2) return;
  const W = canvas.offsetWidth || 260, H = 70;
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);

  const vs  = pts.map(p => p.v);
  const mn  = Math.min(...vs), mx = Math.max(...vs);
  const rng = mx - mn || mn * 0.01 || 1;
  const px  = pts.map((p, i) => ({
    x: (i / (pts.length - 1)) * W,
    y: H - ((p.v - mn) / rng) * (H * 0.82) - H * 0.06
  }));

  const col = isUp ? '#00ff88' : '#ff3366';
  const gr  = ctx.createLinearGradient(0, 0, 0, H);
  gr.addColorStop(0, isUp ? 'rgba(0,255,136,.18)' : 'rgba(255,51,102,.18)');
  gr.addColorStop(1, 'rgba(0,0,0,0)');

  // Fill
  ctx.beginPath();
  px.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fillStyle = gr; ctx.fill();

  // Line
  ctx.beginPath();
  px.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
  ctx.strokeStyle = col; ctx.lineWidth = 1.5;
  ctx.shadowColor = col; ctx.shadowBlur = 5;
  ctx.stroke();

  // End dot
  const last = px[px.length - 1];
  ctx.beginPath(); ctx.arc(last.x, last.y, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = col; ctx.shadowBlur = 8; ctx.fill();
}

async function fetchCrypto() {

    if (!r.ok) throw new Error('binance ' + r.status);
    const all = await r.json();
    const map = {};
    all.forEach(t => { map[t.symbol] = t; });

    // Fetch USD/JPY and USD/THB for conversion
    const fxr = await fetch('https://api.frankfurter.app/latest?from=USD&to=JPY,THB');
    const fx  = fxr.ok ? await fxr.json() : null;
    const usdJpy = fx?.rates?.JPY || 150;
    const usdThb = fx?.rates?.THB || 34;

    const out = {};
    const missing = [];
    AC.forEach(s => {
      const bsym = BINANCE_SYM[s] || (s + 'USDT');
      const t = map[bsym];
      if (t) {
        const usd = parseFloat(t.lastPrice);
        out[s] = { name:s, cat:'CRYPTO', usd, jpy:usd*usdJpy, thb:usd*usdThb, change:parseFloat(t.priceChangePercent)||0 };
      } else {
        missing.push(s); // not on Binance (e.g. PSOL, JUPSOL)
      }
    });
    // Fallback: try CoinGecko for missing symbols
    if (missing.length) {
      try {
        const ids = missing.map(geckoId).join(',');
        const gr = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd,jpy,thb&include_24hr_change=true`);
        if (gr.ok) {
          const gd = await gr.json();
          missing.forEach(s => {
            const id = geckoId(s);
            if (gd[id]) out[s] = { name:s, cat:'CRYPTO', usd:gd[id].usd, jpy:gd[id].jpy, thb:gd[id].thb, change:gd[id].usd_24h_change||0 };
          });
        }
      } catch(e2) { /* CoinGecko unavailable, skip */ }
    }
    return out;
  } catch(e) { console.error('crypto fetch error:', e); return {}; }

function saveH(s, val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) holdings[s] = v; else delete holdings[s];
  localStorage.setItem('mhHoldings', JSON.stringify(holdings));
  updatePF();
}

function hRow(s) {
  if (!showH) return '';
  const qty = holdings[s] || '', d = MD[s];
  let vStr = '';
  if (qty && d) {
    const usdJpy = MD['USDJPY']?.jpy || 150, usdThb = MD['USDJPY']?.thb || 33;
    let usd = 0;
    if (d.cat === 'SET株')  usd = qty * (d.price / usdThb);
    if (d.cat === 'CRYPTO') usd = qty * (d.usd || 0);
    if (usd > 0) vStr = '$' + usd.toLocaleString('en-US', {maximumFractionDigits:0});
  }
  return `<div class="holding-row">
    <span class="holding-label">保有数量:</span>
    <input class="holding-input" type="number" min="0" step="any" placeholder="0" value="${qty}"
      onchange="saveH('${s}',this.value)" oninput="saveH('${s}',this.value)" onclick="event.stopPropagation()">
    <span class="holding-value">${vStr}</span>
  </div>`;
}

function updatePF() {
  const usdJpy = MD['USDJPY']?.jpy || 150, usdThb = MD['USDJPY']?.thb || 33;
  let tot = 0;
  [...AC, ...AT].forEach(s => {
    const qty = holdings[s] || 0; if (!qty) return;
    const d = MD[s]; if (!d) return;
    if (d.cat === 'SET株')  tot += qty * (d.price / usdThb);
    if (d.cat === 'CRYPTO') tot += qty * (d.usd || 0);
  });
  const sv = (id,v) => document.getElementById(id).textContent = v;
  if (tot > 0) {
    sv('pfU', '$'  + tot.toLocaleString('en-US', {maximumFractionDigits:0}));
    sv('pfJ', '¥'  + (tot*usdJpy).toLocaleString('ja-JP', {maximumFractionDigits:0}));
    sv('pfT', '฿'  + (tot*usdThb).toLocaleString('en-US', {maximumFractionDigits:0}));
  } else { sv('pfU','--'); sv('pfJ','--'); sv('pfT','--'); }
}

function renderAlerts() {
  const el = document.getElementById('alertList'); if (!el) return;
  if (!alerts.length) { el.innerHTML = '<div style="font-family:\'Share Tech Mono\',monospace;font-size:11px;color:var(--muted);text-align:center;padding:18px;">アラームが設定されていません</div>'; return; }
  el.innerHTML = alerts.map(a => `
    <div class="alert-item ${a.triggered?'triggered':''}">
      <div>
        <span class="al-sym">${a.symbol}</span>
        <span class="al-cond">${a.condition==='above'?'↑ 以上':'↓ 以下'}</span>
        <span class="al-price">${a.currency}${a.price.toLocaleString()}</span>
        <span class="badge ${a.triggered?'b-hit':'b-active'}">${a.triggered?'🔔 発火済':'● 監視中'}</span>
      </div>
      <button class="btn-danger" onclick="rmAlert(${a.id})">削除</button>
    </div>`).join('');
}

function checkAlerts() {
  alerts.forEach(a => {
    if (a.triggered) return;
    const d = MD[a.symbol]; if (!d) return;
    let cur = a.currency === 'JPY' ? d.jpy : a.currency === 'THB' ? d.thb : d.usd;
    if (d.cat === 'SET株') cur = d.price;
    if (d.cat === 'FOREX') cur = d.jpy;
    if (cur == null) return;
    const hit = (a.condition==='above' && cur>=a.price) || (a.condition==='below' && cur<=a.price);
    if (hit && !triggered.has(a.id)) {
      a.triggered = true; triggered.add(a.id);
      toast('🔔 アラーム発火！', `${a.symbol} が ${a.currency}${a.price.toLocaleString()} ${a.condition==='above'?'以上':'以下'} に到達！`, false, true);
    }
  });
  localStorage.setItem('mhAlerts', JSON.stringify(alerts));
  updBadge();
}

function updBadge() {
  const n = alerts.filter(a => a.triggered).length;
  const b = document.getElementById('alertBadge');
  b.style.display = n > 0 ? 'flex' : 'none'; b.textContent = n;
}

function quickAlert(s) { switchTab('alerts'); document.getElementById('asSym').value = s; document.getElementById('asPrice').focus(); }

// ═══════════════════════════════════════════════
// TOAST & SOUND
// ═══════════════════════════════════════════════
function toast(title, body, isErr=false, isAl=false) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div'); t.className = 'toast';
  t.style.borderColor = isAl ? 'var(--alert)' : isErr ? 'var(--red)' : 'var(--accent)';
  t.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
  c.appendChild(t);
  if (isAl) ping();
  setTimeout(() => { t.style.transition='opacity .5s'; t.style.opacity='0'; setTimeout(()=>t.remove(),500); }, 5000);
}

function ping() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [440,550,660].forEach((fr,i) => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.frequency.value=fr; o.type='sine';
      g.gain.setValueAtTime(.1, ctx.currentTime+i*.15);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+i*.15+.3);
      o.start(ctx.currentTime+i*.15); o.stop(ctx.currentTime+i*.15+.3);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
const TABS = ['all','crypto','forex','thai','alerts','manage'];
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', TABS[i]===tab));
  document.querySelectorAll('.section-panels').forEach(s => s.classList.remove('active'));
  const el = document.getElementById('section-'+tab); if (el) el.classList.add('active');
  // Re-draw charts when switching tabs (canvas may have been hidden)
  setTimeout(() => { [...AC,'USDJPY','THBJPY',...AT].forEach(s => loadAndDraw(s)); }, 50);
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
function f(n, dec=2) {
  if (n == null) return '--';
  return n.toLocaleString('ja-JP', { minimumFractionDigits:dec, maximumFractionDigits:dec });
}

  await fetchAll();
  const o = document.getElementById('lo');
  setTimeout(() => { o.style.opacity='0'; setTimeout(()=>o.remove(),500); }, 900);
  setInterval(fetchAll, 60000);

init();
